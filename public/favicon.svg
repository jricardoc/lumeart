<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="1" />
      <stop offset="70%" stop-color="#FF8C00" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#111A33" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#111A33" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- Outer glowing aura -->
  <circle cx="50" cy="50" r="45" fill="url(#glow)" opacity="0.4" />
  
  <!-- The Core Shard -->
  <polygon points="50,15 80,50 50,85 20,50" fill="url(#crystal)" stroke="#00B4D8" stroke-width="2" />
  
  <!-- Inner Golden Monogram / Pillar -->
  <path d="M40,35 L60,35 L50,65 Z" fill="#D4AF37" />
  <path d="M50,75 L45,67 L55,67 Z" fill="#FF8C00" />
</svg>